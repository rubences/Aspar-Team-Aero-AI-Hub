version: "3.9"

networks:
  aspar_net:
    driver: bridge

volumes:
  influxdb_data:
  milvus_data:
  mongo_data:
  minio_data:
  grafana_data:
  kafka_data:

services:

  # ─── Message Broker ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [aspar_net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [aspar_net]

  # ─── Time-Series Storage ─────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-aspar_secret}
      DOCKER_INFLUXDB_INIT_ORG: aspar
      DOCKER_INFLUXDB_INIT_BUCKET: aspar_telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-aspar_token_dev}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks: [aspar_net]

  # ─── Vector Database ─────────────────────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.0
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    networks: [aspar_net]

  # ─── Document Store ───────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-aspar_secret}
    volumes:
      - mongo_data:/data/db
    networks: [aspar_net]

  # ─── Object Storage ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks: [aspar_net]

  # ─── Identity Provider ────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-aspar_secret}
    networks: [aspar_net]

  # ─── Backend API ──────────────────────────────────────────────────────────────
  backend_api:
    build:
      context: .
      dockerfile: backend_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-aspar_token_dev}
      INFLUXDB_ORG: aspar
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-aspar_secret}@mongodb:27017
      KAFKA_BROKERS: kafka:9092
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: aspar
    depends_on:
      - influxdb
      - mongodb
      - kafka
      - milvus
    networks: [aspar_net]

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./unified_operator_interface
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on: [backend_api]
    networks: [aspar_net]

  # ─── Observability Stack ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/monitoring_stack/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/monitoring_stack/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    networks: [aspar_net]

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-aspar_secret}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/monitoring_stack/grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks: [aspar_net]

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    networks: [aspar_net]
