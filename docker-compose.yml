services:
  # --- Persistence Layer ---
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_AUTO_COMPACTION_RETENTION_RENDER_BY_DEFAULT=true
      - ETCD_AUTO_COMPACTION_RETENTION=1
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - aero-ai-network

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/export
    command: minio server /export
    networks:
      - aero-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - "etcd"
      - "minio"
    networks:
      - aero-ai-network

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=aspar-team
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - aero-ai-network

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - aero-ai-network

  # --- Messaging ---
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - aero-ai-network

  # --- Custom Microservices ---
  api-gateway:
    build: .
    container_name: aspar-api-gateway
    command: ["python", "backend_api/main.py"]
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MCP_TELEMETRY_URL=http://mcp-telemetry:8001
      - MCP_ML_CORE_URL=http://mcp-ml-core:8002
    networks:
      - aero-ai-network
    depends_on:
      - mongodb
      - mcp-telemetry
      - mcp-ml-core
    restart: on-failure

  mcp-telemetry:
    build: .
    container_name: aspar-mcp-telemetry
    command: ["python", "mcp_servers/mcp_telemetry/main.py"]
    ports:
      - "8001:8001"
    networks:
      - aero-ai-network
    depends_on:
      - influxdb
    restart: on-failure

  mcp-ml-core:
    build: .
    container_name: aspar-mcp-ml-core
    command: ["python", "mcp_servers/mcp_ml_core/main.py"]
    ports:
      - "8002:8002"
    networks:
      - aero-ai-network
    restart: on-failure

  mcp-cad-engine:
    build: .
    container_name: aspar-mcp-cad-engine
    command: ["python", "mcp_servers/mcp_cad_engine/main.py"]
    ports:
      - "8003:8003"
    networks:
      - aero-ai-network
    restart: on-failure

  telemetry-ingestor:
    build: .
    container_name: aspar-telemetry-ingestor
    command: ["python", "ingestion_correlation/kafka_consumers/telemetry_consumer.py"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BACKEND_URL=http://api-gateway:8000
      - AUTH_USERNAME=aspar_engineer
      - AUTH_PASSWORD=aspar_pass_2024
    networks:
      - aero-ai-network
    depends_on:
      - kafka
      - influxdb
    restart: on-failure

networks:
  aero-ai-network:
    driver: bridge

volumes:
  influxdb-data:
  mongodb-data:
  milvus-data:
  minio-data:
